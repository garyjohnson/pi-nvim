name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if the commit was made by the release bot itself (prevent loops)
    if: github.event.head_commit.author.name != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '>=1.3.13'

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: make test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run standard-version
        run: |
          # Fail if tag already exists (race condition or retry)
          bun run release || {
            echo "::error::standard-version failed - tag may already exist. This indicates a race condition or duplicate commit."
            exit 1
          }

      - name: Push version bump and tags
        run: git push --follow-tags origin main

      - name: Extract release notes from CHANGELOG
        id: release-notes
        run: |
          TAG=$(git describe --tags --abbrev=0)
          VERSION=${TAG#v}
          NOTES=$(awk "/^### \\[${VERSION}\\]{found=1; next} /^### \\[/{if(found) exit} found{print}" CHANGELOG.md)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.release-notes.outputs.tag }}" --title "${{ steps.release-notes.outputs.tag }}" --notes "${{ steps.release-notes.outputs.notes }}"